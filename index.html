<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Brunswick Base Map — WA DOR Style</title>

  <!-- ArcGIS JS API 4.x -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/light/main.css" />
  <script src="https://js.arcgis.com/4.28/"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    #viewDiv {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    /* ── Title bar (mirrors WA DOR clean header) ── */
    #titleBar {
      position: absolute;
      top: 12px;
      left: 60px;
      z-index: 99;
      background: rgba(255, 255, 255, 0.92);
      padding: 8px 18px;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
    }
    #titleBar h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
    #titleBar p {
      margin: 2px 0 0;
      font-size: 11px;
      color: #777;
    }

    /* ── Layer‑toggle panel ── */
    #layerPanel {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 99;
      background: rgba(255, 255, 255, 0.94);
      padding: 10px 14px;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
      max-height: calc(100vh - 60px);
      overflow-y: auto;
      min-width: 200px;
    }
    #layerPanel h2 {
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      border-bottom: 1px solid #ddd;
      padding-bottom: 4px;
    }
    .layer-group {
      margin-bottom: 6px;
    }
    .layer-group-title {
      font-size: 11px;
      font-weight: 600;
      color: #555;
      margin: 6px 0 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .layer-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
      font-size: 12px;
      color: #444;
      cursor: pointer;
    }
    .layer-toggle input[type="checkbox"] {
      accent-color: #73600a;
    }
    .swatch {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 2px;
      border: 1px solid rgba(0,0,0,0.15);
      flex-shrink: 0;
    }

    /* ── Full-extent button ── */
    #fullExtentBtn {
      display: flex;
      align-items: center;
      gap: 5px;
      margin: 10px 0 4px;
      padding: 6px 10px;
      width: 100%;
      background: #4c7300;
      color: #fff;
      border: none;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      box-sizing: border-box;
    }
    #fullExtentBtn:hover { background: #3a5800; }
    #fullExtentBtn svg { flex-shrink: 0; }
  </style>
</head>
<body>

  <div id="viewDiv"></div>

  <!-- Title banner -->
  <div id="titleBar">
    <h1>New Brunswick — Base Map</h1>
    <p>GeoNB data · WA DOR cartographic style</p>
  </div>

  <!-- Layer toggles -->
  <div id="layerPanel">
    <h2>Layers</h2>

    <div class="layer-group">
      <div class="layer-group-title">Boundaries</div>
      <label class="layer-toggle">
        <input type="checkbox" data-layer="counties" checked />
        <span class="swatch" style="background:#732600;"></span>
        Counties &amp; Parishes
      </label>
      <label class="layer-toggle">
        <input type="checkbox" data-layer="cities" checked />
        <span class="swatch" style="background:rgba(252,210,218,0.7);"></span>
        Cities (SJ / Fred / Monc)
      </label>
    </div>

    <div class="layer-group">
      <div class="layer-group-title">Environment</div>
      <label class="layer-toggle">
        <input type="checkbox" data-layer="hillshade" checked />
        <span class="swatch" style="background:linear-gradient(135deg, #ccc 30%, #999 70%);"></span>
        Hillshade (LiDAR)
      </label>
      <label class="layer-toggle">
        <input type="checkbox" data-layer="landcover" checked />
        <span class="swatch" style="background:linear-gradient(135deg, #5a8a3c 40%, #c8b464 60%);"></span>
        Land Cover (NRCan)
      </label>
      <label class="layer-toggle">
        <input type="checkbox" data-layer="hydro" checked />
        <span class="swatch" style="background:#9ebbd7;"></span>
        Hydrography (NBHN)
      </label>
      <label class="layer-toggle">
        <input type="checkbox" data-layer="parks" checked />
        <span class="swatch" style="background:rgba(76,115,0,0.6);"></span>
        Provincial Parks
      </label>
      <label class="layer-toggle">
        <input type="checkbox" data-layer="crownland" checked />
        <span class="swatch" style="background:rgba(180,215,158,0.5);"></span>
        Crown Land
      </label>
      <label class="layer-toggle">
        <input type="checkbox" data-layer="wildlife" checked />
        <span class="swatch" style="background:rgba(76,115,0,0.6);"></span>
        Wildlife Refuges
      </label>
      <label class="layer-toggle">
        <input type="checkbox" data-layer="localparks" checked />
        <span class="swatch" style="background:rgba(144,199,94,0.7);"></span>
        Local Parks (SJ / Fred / Monc)
      </label>
    </div>

    <div class="layer-group">
      <div class="layer-group-title">Terrain</div>
      <label class="layer-toggle">
        <input type="checkbox" data-layer="contours" checked />
        <span class="swatch" style="background:transparent;border-bottom:2px solid #8c5a2d;height:10px;"></span>
        Contours (50 m / 10 m)
      </label>
    </div>

    <div class="layer-group">
      <div class="layer-group-title">Transportation</div>
      <label class="layer-toggle">
        <input type="checkbox" data-layer="roads" checked />
        <span class="swatch" style="background:linear-gradient(135deg, #e64c00 50%, #ffaa00 50%);border:1px solid #8a6e14;"></span>
        Road Network (NBRN)
      </label>
      <label class="layer-toggle">
        <input type="checkbox" data-layer="railway" checked />
        <span class="swatch" style="background:#323232;border-radius:0;"></span>
        Railway (NRWN)
      </label>
    </div>

    <div class="layer-group">
      <div class="layer-group-title">Cadastral</div>
      <label class="layer-toggle">
        <input type="checkbox" data-layer="parcels" checked />
        <span class="swatch" style="background:transparent;border:1px solid #b2b2b2;"></span>
        Parcels
      </label>
      <label class="layer-toggle">
        <input type="checkbox" data-layer="buildings" checked />
        <span class="swatch" style="background:rgba(160,110,70,0.4);border:1px solid rgba(130,85,50,0.6);"></span>
        Buildings
      </label>
    </div>

    <div class="layer-group">
      <div class="layer-group-title">Facilities</div>
      <label class="layer-toggle">
        <input type="checkbox" data-layer="schools" checked />
        <span class="swatch" style="background:#4682b4;"></span>
        Public Schools
      </label>
    </div>

    <div class="layer-group">
      <div class="layer-group-title">Labels</div>
      <label class="layer-toggle">
        <input type="checkbox" data-layer="placenames" checked />
        <span class="swatch" style="background:#333;color:#fff;font-size:9px;text-align:center;line-height:12px;">A</span>
        Place Names
      </label>
    </div>

    <button id="fullExtentBtn" title="Zoom to full extent of New Brunswick">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="1" width="14" height="14" rx="2"/><polyline points="1,6 1,1 6,1"/><polyline points="10,1 15,1 15,6"/><polyline points="15,10 15,15 10,15"/><polyline points="6,15 1,15 1,10"/></svg>
      Full Extent of NB
    </button>
  </div>

  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/layers/MapImageLayer",
      "esri/layers/FeatureLayer",
      "esri/layers/ImageryLayer",
      "esri/layers/GroupLayer",
      "esri/widgets/ScaleBar",
      "esri/widgets/Legend",
      "esri/widgets/Expand"
    ], function (
      Map, MapView, MapImageLayer, FeatureLayer, ImageryLayer, GroupLayer,
      ScaleBar, Legend, Expand
    ) {

      /* ============================================================
         COLOR PALETTE — extracted from WA DOR WADOR_Base_Map
         ============================================================
         State fill           : [225, 225, 225]  #E1E1E1
         County outline       : [115,  38,   0]  #732600  width 2
         Water bodies         : [158, 187, 215]  #9EBBD7
         Parks / open space   : [ 76, 115,   0]  #4C7300  @ 40 % transparency
         Road casing (shadow) : dark gray / brown tones
         Road fill            : warm tan / amber for major, lighter for minor
         Parcels              : thin brown outline
         Background (page)    : white / very light gray
        ============================================================ */

      // ─── Helper: RGBA array → CSS ───
      function rgba(r, g, b, a) { return [r, g, b, a !== undefined ? a : 255]; }

      // ==================================================================
      //  1.  HILLSHADE — LiDAR 1 m DEM  (WA DOR "Landform" style)
      //      WA DOR uses SRTM + DOT hillshades as subtle gray terrain
      //      under all other layers from ~1:7 M down to ~1:36 K.
      //      NB LiDAR is 1 m so we can keep it at fine scales.
      //      Multiply blend darkens shadows; opacity keeps it subtle.
      // ==================================================================
      var hillshadeLayer = new ImageryLayer({
        url: "https://gis-erd-der.gnb.ca/server/rest/services/LidarProducts/Hillshade_45/ImageServer",
        id: "hillshade",
        title: "Hillshade (LiDAR)",
        opacity: 0.2,
        blendMode: "multiply",
        minScale: 7000000,
        format: "jpgpng"
      });

      // ==================================================================
      //  1b. LAND COVER — NRCan 30 m (2010)
      //      Subtle colour wash showing forest / wetland / cropland etc.
      //      Very low opacity so it tints without dominating.
      // ==================================================================
      var landCoverRaw = new MapImageLayer({
        url: "https://geoappext.nrcan.gc.ca/arcgis/rest/services/FGP/LandCover_EN/MapServer",
        title: "Land Cover (NRCan)",
        opacity: 1,
        imageFormat: "png32",
        sublayers: [{ id: 0 }]
      });

      // Mask layer — NB counties rendered as solid opaque fill;
      // blendMode "destination-in" keeps only the land-cover pixels
      // that overlap NB territory.
      var nbClipMask = new MapImageLayer({
        url: "https://geonb.snb.ca/arcgis/rest/services/GeoNB_SNB_Counties/MapServer",
        title: "NB Clip Mask",
        imageFormat: "png32",
        blendMode: "destination-in",
        sublayers: [{
          id: 0,
          renderer: {
            type: "simple",
            symbol: {
              type: "simple-fill",
              color: [0, 0, 0, 255],
              outline: null
            }
          }
        }]
      });

      // GroupLayer isolates the blend so the mask only clips
      // the land cover, not the rest of the map.
      var landCoverLayer = new GroupLayer({
        id: "landcover",
        title: "Land Cover (NRCan)",
        opacity: 0.15,
        layers: [landCoverRaw, nbClipMask]
      });

      // ==================================================================
      //  2.  HYDROGRAPHY — NBHN  (Water: #9EBBD7)
      //      Dynamic layer so we can override symbology
      // ==================================================================
      var hydroLayer = new MapImageLayer({
        url: "https://geonb.snb.ca/arcgis/rest/services/GeoNB_DNR_NBHN/MapServer",
        id: "hydro",
        title: "Hydrography (NBHN)",
        opacity: 1,
        imageFormat: "png32",
        sublayers: [
          {
            id: 13,  // Water Bodies – polygons
            title: "Water Bodies",
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-fill",
                color: rgba(158, 187, 215, 255),
                outline: null
              }
            }
          },
          {
            id: 12,  // Islands
            title: "Islands",
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-fill",
                color: rgba(225, 225, 225, 255),
                outline: null
              }
            }
          },
          {
            id: 11,  // Wetlands
            title: "Wetlands",
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-fill",
                color: rgba(158, 187, 215, 100),
                outline: null
              }
            }
          },
          {
            id: 10,  // Water Courses – lines
            title: "Water Courses",
            minScale: 500000,
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-line",
                color: rgba(158, 187, 215, 255),
                width: 1.4
              }
            }
          },
          {
            id: 16,  // Coastal Features
            title: "Coastal Features",
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-fill",
                color: rgba(158, 187, 215, 255),
                outline: null
              }
            }
          }
        ]
      });

      // ==================================================================
      //  3.  PROVINCIAL PARKS  (Open Space: #4C7300 @ 40 % transparency)
      // ==================================================================
      var parksLayer = new MapImageLayer({
        url: "https://geonb.snb.ca/arcgis/rest/services/GeoNB_DNR_ProvincialParks/MapServer",
        id: "parks",
        title: "Provincial Parks",
        opacity: 0.6,
        imageFormat: "png32",
        sublayers: [{
          id: 0,
          title: "Provincial Parks",
          renderer: {
            type: "simple",
            symbol: {
              type: "simple-fill",
              color: rgba(76, 115, 0, 255),
              outline: {
                type: "simple-line",
                color: rgba(56, 90, 0, 200),
                width: 1.4
              }
            }
          }
        }]
      });

      // ==================================================================
      //  3b. CROWN LAND — pale green wash for provincial Crown lands
      // ==================================================================
      var crownLandLayer = new MapImageLayer({
        url: "https://geonb.snb.ca/arcgis/rest/services/GeoNB_DNR_Crown_Land/MapServer",
        id: "crownland",
        title: "Crown Land",
        opacity: 0.30,
        imageFormat: "png32",
        sublayers: [{
          id: 3,
          title: "Crown Land",
          renderer: {
            type: "simple",
            symbol: {
              type: "simple-fill",
              color: [180, 215, 158, 255],       // pale sage green
              outline: null
            }
          }
        }]
      });

      // ==================================================================
      //  3c. WILDLIFE REFUGES — same green as provincial parks
      // ==================================================================
      var wildlifeRefugesLayer = new MapImageLayer({
        url: "https://gis-erd-der.gnb.ca/server/rest/services/OpenData/WildlifeRefuge/MapServer",
        id: "wildlife",
        title: "Wildlife Refuges",
        opacity: 0.6,
        imageFormat: "png32",
        sublayers: [{
          id: 0,
          title: "Wildlife Refuges",
          renderer: {
            type: "simple",
            symbol: {
              type: "simple-fill",
              color: rgba(76, 115, 0, 255),
              outline: {
                type: "simple-line",
                color: rgba(56, 90, 0, 200),
                width: 1.2
              }
            }
          }
        }]
      });

      // ==================================================================
      //  3d. LOCAL PARKS — Fredericton & Moncton municipal parks
      //      Lighter green to distinguish from provincial parks
      // ==================================================================
      var frederictonParksLayer = new FeatureLayer({
        url: "https://services2.arcgis.com/iLWAxhpxafhOza2U/arcgis/rest/services/Park_Open_Space/FeatureServer/0",
        id: "localparks-fredericton",
        title: "Fredericton Parks & Open Space",
        opacity: 0.55,
        renderer: {
          type: "unique-value",
          field: "Zones",
          defaultSymbol: {
            type: "simple-fill",
            color: [144, 199, 94, 200],
            outline: { type: "simple-line", color: [100, 160, 60, 200], width: 0.6 }
          },
          uniqueValueInfos: [
            {
              value: "Park",
              label: "Park",
              symbol: {
                type: "simple-fill",
                color: [144, 199, 94, 200],
                outline: { type: "simple-line", color: [100, 160, 60, 200], width: 0.6 }
              }
            },
            {
              value: "Open Space",
              label: "Open Space",
              symbol: {
                type: "simple-fill",
                color: [180, 215, 140, 180],
                outline: { type: "simple-line", color: [130, 180, 90, 180], width: 0.5 }
              }
            }
          ]
        }
      });

      var monctonParksLayer = new FeatureLayer({
        url: "https://services1.arcgis.com/E26PuSoie2Y7bbyI/arcgis/rest/services/Parks/FeatureServer/0",
        id: "localparks-moncton",
        title: "Moncton Parks",
        opacity: 0.55,
        renderer: {
          type: "simple",
          symbol: {
            type: "simple-fill",
            color: [144, 199, 94, 200],
            outline: { type: "simple-line", color: [100, 160, 60, 200], width: 0.6 }
          }
        }
      });

      var saintJohnParksLayer = new FeatureLayer({
        url: "https://services.arcgis.com/DLk7hgTJeJILuEBg/ArcGIS/rest/services/Parks3/FeatureServer/0",
        id: "localparks-saintjohn",
        title: "Saint John Parks",
        opacity: 0.55,
        renderer: {
          type: "simple",
          symbol: {
            type: "simple-fill",
            color: [144, 199, 94, 200],
            outline: { type: "simple-line", color: [100, 160, 60, 200], width: 0.6 }
          }
        }
      });

      // ==================================================================
      //  4.  COUNTIES & PARISHES  (County outline: #732600  2 px)
      // ==================================================================
      var countiesLayer = new MapImageLayer({
        url: "https://geonb.snb.ca/arcgis/rest/services/GeoNB_SNB_Counties/MapServer",
        id: "counties",
        title: "Counties & Parishes",
        imageFormat: "png32",
        customParameters: { dpi: 192 },   // 2× supersample for crisp thin lines
        sublayers: [
          {
            id: 0,  // Counties
            title: "Counties",
            minScale: 3000000,
            maxScale: 0,          // draw all the way to max zoom
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-fill",
                color: [0, 0, 0, 0],             // transparent fill
                outline: {
                  type: "simple-line",
                  color: [100, 65, 45, 190],      // warm taupe — refined, not garish
                  width: 1.2
                }
              }
            },
            labelingInfo: [
              {
                // Overview labels (province-wide)
                labelExpression: "[ENG_NAME]",
                labelPlacement: "always-horizontal",
                symbol: {
                  type: "text",
                  color: [85, 55, 35, 255],
                  haloColor: [255, 255, 255, 210],
                  haloSize: 1.0,
                  font: { size: 7, weight: "bold", family: "Georgia" }
                },
                minScale: 3000000,
                maxScale: 200000
              },
              {
                // Close-up labels — smaller, lighter
                labelExpression: "[ENG_NAME]",
                labelPlacement: "always-horizontal",
                symbol: {
                  type: "text",
                  color: [100, 70, 50, 180],
                  haloColor: [255, 255, 255, 180],
                  haloSize: 0.7,
                  font: { size: 5, weight: "normal", family: "Georgia" }
                },
                minScale: 200000,
                maxScale: 0
              }
            ]
          },
          {
            id: 1,  // Parishes
            title: "Parishes",
            minScale: 500000,
            maxScale: 0,          // draw all the way to max zoom
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-fill",
                color: [0, 0, 0, 0],
                outline: {
                  type: "simple-line",
                  color: [130, 100, 80, 120],     // subtle warm taupe, semi-transparent
                  width: 0.6,
                  style: "dash"
                }
              }
            },
            labelingInfo: [{
              labelExpression: "[ENG_NAME]",
              labelPlacement: "always-horizontal",
              symbol: {
                type: "text",
                color: [120, 90, 70, 160],
                haloColor: [255, 255, 255, 160],
                haloSize: 0.7,
                font: { size: 5, weight: "normal", family: "Georgia" }
              },
              minScale: 150000,
              maxScale: 0
            }]
          }
        ]
      });

      // ==================================================================
      //  5.  CITIES  (NB 911 Communities — SJ, Fredericton, Moncton)
      //      Pink fill like WA DOR municipal areas layer
      // ==================================================================
      var citiesLayer = new MapImageLayer({
        url: "https://geonb.snb.ca/arcgis/rest/services/GeoNB_DPS_NB911_Communities/MapServer",
        id: "cities",
        title: "Cities",
        opacity: 0.45,
        imageFormat: "png32",
        sublayers: [{
          id: 0,
          title: "Municipal Areas",
          definitionExpression: "COMMUNITY_NAME IN ('Saint John','Fredericton','Moncton')",
          renderer: {
            type: "simple",
            symbol: {
              type: "simple-fill",
              color: rgba(252, 210, 218, 140),
              outline: {
                type: "simple-line",
                color: rgba(200, 160, 170, 180),
                width: 1.0
              }
            }
          }
        }]
      });

      // ==================================================================
      //  5b. CONTOURS — 50 m index + 10 m intermediate
      //      Subtle brown topo lines; service scale limits are good:
      //        50 m contours  1:150 K → 1:50 K  (index)
      //        10 m contours  1:50 K  → detail  (intermediate)
      //      Placed above parks / cities, below roads — standard topo order.
      // ==================================================================
      var contoursLayer = new MapImageLayer({
        url: "https://geonb.snb.ca/arcgis/rest/services/GeoNB_SNB_Contours/MapServer",
        id: "contours",
        title: "Contours (LiDAR)",
        opacity: 0.55,
        imageFormat: "png32",
        customParameters: { dpi: 192 },
        sublayers: [
          {
            id: 0,  // 50 m index contours
            title: "Contours – 50 m",
            minScale: 150000,
            maxScale: 50000,
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-line",
                color: [140, 90, 45, 255],
                width: 0.9,
                style: "solid"
              }
            },
            labelingInfo: [{
              labelExpression: "[Contour]",
              labelPlacement: "center-along",
              symbol: {
                type: "text",
                color: [120, 78, 40, 255],
                haloColor: [255, 255, 240, 200],
                haloSize: 0.8,
                font: { size: 5, family: "Tahoma", weight: "normal" }
              },
              minScale: 75000,
              maxScale: 50000
            }]
          },
          {
            id: 1,  // 10 m intermediate contours
            title: "Contours – 10 m",
            minScale: 50000,
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-line",
                color: [168, 120, 60, 200],
                width: 0.4,
                style: "solid"
              }
            },
            labelingInfo: [{
              labelExpression: "[Contour]",
              labelPlacement: "center-along",
              symbol: {
                type: "text",
                color: [140, 95, 50, 230],
                haloColor: [255, 255, 240, 180],
                haloSize: 0.8,
                font: { size: 5, family: "Tahoma" }
              },
              minScale: 24000
            }]
          }
        ]
      });

      // ==================================================================
      //  6.  ROAD NETWORK — NBRN
      //      Uses Func_Road_Class unique-value renderer per scale layer,
      //      mapping NB road classes to WA DOR color palette:
      //        WA 00 (Interstate)  → NB Freeway           [230,76,0]
      //        WA 00               → NB Expressway/hwy    [230,76,0]
      //        WA 01 (US Highway)  → NB Arterial          [255,170,0]
      //        WA 02 (State Route) → NB Collector         [255,170,0]
      //        WA 03 (Local)       → NB Local roads       [255,231,115]
      //        Shadow/casing       → light gray beneath
      // ==================================================================

      // Shared unique-value info builders keyed by Func_Road_Class
      function roadUVI(value, color, width, style) {
        return {
          value: value,
          label: value,
          symbol: {
            type: "simple-line",
            color: color,
            width: width,
            style: style || "solid"
          }
        };
      }

      // WA DOR palette
      var cFreeway     = rgba(230, 76, 0, 255);    // Interstate orange-red
      var cExpressway  = rgba(230, 76, 0, 255);     // same tier
      var cArterial    = rgba(255, 170, 0, 255);    // amber
      var cCollector   = rgba(255, 170, 0, 255);    // amber (slightly smaller)
      var cLocalNum    = rgba(255, 231, 115, 255);  // warm yellow
      var cLocal       = rgba(200, 200, 200, 255);  // light gray
      var cLocalGravel = rgba(180, 180, 180, 255);  // slightly darker gray
      var cRamp        = rgba(220, 200, 160, 255);  // muted
      var cResource    = rgba(115, 76, 0, 255);     // brown (dashed)
      var cSpecial     = rgba(160, 160, 160, 255);  // gray

      var roadsLayer = new MapImageLayer({
        url: "https://geonb.snb.ca/arcgis/rest/services/GeoNB_Basemap_NBRN/MapServer",
        id: "roads",
        title: "Road Network (NBRN)",
        imageFormat: "png24",
        sublayers: [
          {
            // ── Small scale (whole province overview) ──
            // Shows: Freeway, Expressway/highway, Arterial, Collector
            id: 3,
            title: "Roads (small scale)",
            definitionExpression: "Func_Road_Class IN ('Freeway','Expressway/highway','Arterial','Collector')",
            renderer: {
              type: "unique-value",
              field: "Func_Road_Class",
              defaultSymbol: { type: "simple-line", color: cLocal, width: 0.5 },
              defaultLabel: "Other",
              uniqueValueInfos: [
                roadUVI("Freeway",             cFreeway,    3.0),
                roadUVI("Expressway/highway",  cExpressway, 2.4),
                roadUVI("Arterial",            cArterial,   1.4),
                roadUVI("Collector",           cCollector,  0.9)
              ]
            }
          },
          {
            // ── Medium scale (regional) ──
            // Shows: Freeway, Expressway/highway, Arterial, Collector
            id: 2,
            title: "Roads (medium scale)",
            definitionExpression: "Func_Road_Class IN ('Freeway','Expressway/highway','Arterial','Collector','NBDOT Local Numbered')",
            renderer: {
              type: "unique-value",
              field: "Func_Road_Class",
              defaultSymbol: { type: "simple-line", color: cLocal, width: 0.6 },
              defaultLabel: "Other",
              uniqueValueInfos: [
                roadUVI("Freeway",             cFreeway,    4.5),
                roadUVI("Expressway/highway",  cExpressway, 3.5),
                roadUVI("Arterial",            cArterial,   2.2),
                roadUVI("Collector",           cCollector,  1.4),
                roadUVI("NBDOT Local Numbered",cLocalNum,   0.8)
              ]
            }
          },
          {
            // ── Large scale (city / detail) ──
            // Shows ALL road classes — local roads white (gray casing layer beneath)
            id: 1,
            title: "Roads (large scale)",
            renderer: {
              type: "unique-value",
              field: "Func_Road_Class",
              defaultSymbol: { type: "simple-line", color: [255,255,255,255], width: 1.5 },
              defaultLabel: "Other Roads",
              uniqueValueInfos: [
                roadUVI("Freeway",                        cFreeway,    6.5),
                roadUVI("Expressway/highway",             cExpressway, 5.0),
                roadUVI("Arterial",                       cArterial,   3.5),
                roadUVI("Collector",                      cCollector,  2.5),
                roadUVI("NBDOT Local Numbered",           cLocalNum,   1.8),
                roadUVI("NBDOT Local Named",              cLocalNum,   1.5),
                roadUVI("DOT Local Named (Gravel)",       [255,255,255,255], 1.8, "solid"),
                roadUVI("Local/street",                   [255,255,255,255], 1.8),
                roadUVI("Local/unknown",                  [255,255,255,255], 1.5),
                roadUVI("Local/strata",                   [255,255,255,255], 1.5),
                roadUVI("Ramp",                           cRamp,       1.5),
                roadUVI("Service Lane",                   [255,255,255,255], 1.2),
                roadUVI("Alleyway/lane",                  [255,255,255,255], 1.0),
                roadUVI("Weigh Station",                  [255,255,255,255], 1.0),
                roadUVI("NBDOT Road Public Access",       [255,255,255,255], 1.5),
                roadUVI("NBDNR Resource Road F1",         cResource,   1.0, "dash"),
                roadUVI("NBDNR Resource Road F2",         cResource,   1.0, "dash"),
                roadUVI("NBDNR Resource Road F3",         cResource,   0.8, "dash"),
                roadUVI("NBDNR Resource Road F4",         cResource,   0.7, "dash"),
                roadUVI("NBDNR Resource Road F5",         cResource,   0.7, "dash"),
                roadUVI("NBDNR Resource Road F6",         cResource,   0.7, "dash"),
                roadUVI("Non-vehicular Addressed Segment",[220,220,220,255], 0.7, "dash"),
                roadUVI("NBDOT Road Under Construction",  [220,220,220,255], 0.8, "dash"),
                roadUVI("Unknown",                        [255,255,255,255], 1.0)
              ]
            }
          },
          {
            // ── Ferry routes (all scales) ──
            id: 0,
            title: "Ferry Routes",
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-line",
                color: rgba(100, 140, 180, 255),
                width: 2.0,
                style: "dash"
              }
            }
          }
        ]
      });

      // ==================================================================
      //  6b. ROAD CASING — wider gray lines under white local roads
      // ==================================================================
      var roadsCasingLayer = new MapImageLayer({
        url: "https://geonb.snb.ca/arcgis/rest/services/GeoNB_Basemap_NBRN/MapServer",
        id: "roadscasing",
        title: "Road Casing",
        imageFormat: "png24",
        minScale: 36112,
        sublayers: [{
          id: 1,
          title: "Local Road Casing",
          definitionExpression: "Func_Road_Class IN ('Local/street','Local/unknown','Local/strata','DOT Local Named (Gravel)','NBDOT Road Public Access','Service Lane','Alleyway/lane','Weigh Station','Unknown')",
          renderer: {
            type: "simple",
            symbol: {
              type: "simple-line",
              color: rgba(178, 178, 178, 255),
              width: 3.5
            }
          }
        }]
      });

      // ==================================================================
      //  6c. RAILWAY — National Railway Network (NRWN)
      //      Classic topo-style: solid dark line for tracks,
      //      small markers & labels for stations.
      //      Tracks appear at 1:72 K (matching local highway detail).
      // ==================================================================
      var railwayLayer = new MapImageLayer({
        url: "https://geonb.snb.ca/arcgis/rest/services/GeoNB_SNB_NRWN/MapServer",
        id: "railway",
        title: "Railway (NRWN)",
        imageFormat: "png32",
        sublayers: [
          {
            id: 0,  // Stations
            title: "Railway Stations",
            minScale: 36000,
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-marker",
                size: 5,
                color: [50, 50, 50, 255],
                style: "circle",
                outline: {
                  type: "simple-line",
                  color: [30, 30, 30, 255],
                  width: 0.6
                }
              }
            },
            labelingInfo: [{
              labelExpression: "[STNENNAME]",
              labelPlacement: "above-right",
              symbol: {
                type: "text",
                color: [50, 50, 50, 255],
                haloColor: [255, 255, 255, 220],
                haloSize: 1.0,
                font: { size: 7, family: "Arial", weight: "normal" }
              },
              minScale: 24000,
              maxScale: 0
            }]
          },
          {
            id: 5,  // Tracks
            title: "Railway Tracks",
            minScale: 72000,
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-line",
                color: [50, 50, 50, 200],
                width: 1.2,
                style: "solid"
              }
            }
          }
        ]
      });

      // ==================================================================
      //  7.  PLACE NAMES  (drawn on top of everything)
      //      Uses GeoNB_NRCan_PlaceNames — point features with name labels
      // ==================================================================
      var placeNamesLayer = new MapImageLayer({
        url: "https://geonb.snb.ca/arcgis/rest/services/GeoNB_NRCan_PlaceNames/MapServer",
        id: "placenames",
        title: "Place Names",
        opacity: 1,
        imageFormat: "png32",
        sublayers: [
          { id: 3 },  // Terrain Features — keep default
          { id: 2 },  // Constructed Features — keep default
          { id: 1 },  // Administrative Areas — keep default
          {
            id: 0,    // Geographic Names — hide all point markers, labels still draw
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-marker",
                size: 0,
                color: [0, 0, 0, 0],
                outline: null
              }
            }
          }
        ]
      });

      // ==================================================================
      //  8.  PARCELS  (thin warm brown outline, like WA DOR Basic Parcels)
      // ==================================================================
      var parcelsLayer = new MapImageLayer({
        url: "https://geonb.snb.ca/arcgis/rest/services/GeoNB_SNB_Parcels/MapServer",
        id: "parcels",
        title: "Parcels",
        minScale: 12500,
        imageFormat: "png32",
        sublayers: [{
          id: 0,
          title: "Parcels",
          renderer: {
            type: "simple",
            symbol: {
              type: "simple-fill",
              color: rgba(0, 0, 0, 0),
              outline: {
                type: "simple-line",
                color: rgba(178, 178, 178, 255),   // WA DOR parcel gray
                width: 0.5
              }
            }
          }
        }]
      });

      // ==================================================================
      //  9.  BUILDINGS  (LiDAR footprints — transparent brown)
      //      Appears at 1:9,028 — tighter than parcels (1:12,500)
      // ==================================================================
      var buildingsLayer = new MapImageLayer({
        url: "https://geonb.snb.ca/arcgis/rest/services/GeoNB_SNB_Buildings/MapServer",
        id: "buildings",
        title: "Buildings",
        minScale: 4500,
        imageFormat: "png24",
        sublayers: [{
          id: 0,
          title: "Building Footprints",
          renderer: {
            type: "simple",
            symbol: {
              type: "simple-fill",
              color: [160, 110, 70, 100],
              outline: {
                type: "simple-line",
                color: [130, 85, 50, 160],
                width: 0.4
              }
            }
          }
        }]
      });

      // ==================================================================
      //  10. PUBLIC SCHOOLS  (EECD — Anglophone & Francophone)
      //      Small square markers; labels at very close zoom.
      //      Appears at 1:36 K — a step closer than railway.
      // ==================================================================
      var schoolsLayer = new MapImageLayer({
        url: "https://geonb.snb.ca/arcgis/rest/services/GeoNB_EECD_PublicSchools/MapServer",
        id: "schools",
        title: "Public Schools",
        imageFormat: "png32",
        sublayers: [
          {
            id: 1,  // Francophone
            title: "Francophone Schools",
            minScale: 36000,
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-marker",
                size: 7,
                color: [70, 130, 180, 255],
                style: "square",
                outline: {
                  type: "simple-line",
                  color: [40, 80, 130, 255],
                  width: 0.6
                }
              }
            },
            labelingInfo: [{
              labelExpression: "[strNM]",
              labelPlacement: "above-right",
              symbol: {
                type: "text",
                color: [40, 80, 130, 255],
                haloColor: [255, 255, 255, 220],
                haloSize: 1.0,
                font: { size: 7, family: "Arial", weight: "normal" }
              },
              minScale: 18000,
              maxScale: 0
            }]
          },
          {
            id: 0,  // Anglophone
            title: "Anglophone Schools",
            minScale: 36000,
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-marker",
                size: 7,
                color: [70, 130, 180, 255],
                style: "square",
                outline: {
                  type: "simple-line",
                  color: [40, 80, 130, 255],
                  width: 0.6
                }
              }
            },
            labelingInfo: [{
              labelExpression: "[strNM]",
              labelPlacement: "above-right",
              symbol: {
                type: "text",
                color: [40, 80, 130, 255],
                haloColor: [255, 255, 255, 220],
                haloSize: 1.0,
                font: { size: 7, family: "Arial", weight: "normal" }
              },
              minScale: 18000,
              maxScale: 0
            }]
          }
        ]
      });

      // ==================================================================
      //  ASSEMBLE MAP
      // ==================================================================
      var map = new Map({
        layers: [
          hillshadeLayer,   // bottommost — subtle terrain background
          landCoverLayer,   // subdued land cover tint
          hydroLayer,
          crownLandLayer,
          wildlifeRefugesLayer,
          parksLayer,
          frederictonParksLayer,
          monctonParksLayer,
          saintJohnParksLayer,
          citiesLayer,
          countiesLayer,
          contoursLayer,
          railwayLayer,
          roadsCasingLayer,
          roadsLayer,
          parcelsLayer,
          buildingsLayer,
          schoolsLayer,
          placeNamesLayer   // topmost → labels draw over all other layers
        ]
      });

      // ==================================================================
      //  MAP VIEW  — centred on New Brunswick
      // ==================================================================
      var view = new MapView({
        container: "viewDiv",
        map: map,
        center: [-66.5, 46.5],     // New Brunswick centre
        zoom: 8,
        constraints: {
          minZoom: 2,
          maxZoom: 19
        },
        ui: {
          components: ["zoom", "compass", "attribution"]
        },
        // Match WA DOR neutral background outside the data extent
        background: { color: [240, 240, 240, 1] }
      });

      // ── Scale Bar (like WA DOR) ──
      var scaleBar = new ScaleBar({
        view: view,
        unit: "dual",
        style: "ruler"
      });
      view.ui.add(scaleBar, "bottom-left");

      // ── Legend inside an Expand widget ──
      var legend = new Legend({ view: view });
      var legendExpand = new Expand({
        view: view,
        content: legend,
        expanded: false,
        expandTooltip: "Legend"
      });
      view.ui.add(legendExpand, "bottom-right");

      // ==================================================================
      //  LAYER TOGGLE WIRING
      // ==================================================================
      document.querySelectorAll("#layerPanel input[type=checkbox]").forEach(function (cb) {
        cb.addEventListener("change", function () {
          var layerId = this.getAttribute("data-layer");
          var layer = map.allLayers.find(function (l) { return l.id === layerId; });
          // Also check basemap layers
          if (!layer) {
            layer = map.basemap.baseLayers.find(function (l) { return l.id === layerId; });
          }
          if (layer) {
            layer.visible = this.checked;
          }
          // Roads toggle also controls the casing layer
          if (layerId === "roads") {
            var casing = map.allLayers.find(function (l) { return l.id === "roadscasing"; });
            if (casing) casing.visible = this.checked;
          }
          // Local parks toggle controls both Fredericton and Moncton park layers
          if (layerId === "localparks") {
            var fredParks = map.allLayers.find(function (l) { return l.id === "localparks-fredericton"; });
            var moncParks = map.allLayers.find(function (l) { return l.id === "localparks-moncton"; });
            var sjParks = map.allLayers.find(function (l) { return l.id === "localparks-saintjohn"; });
            if (fredParks) fredParks.visible = this.checked;
            if (moncParks) moncParks.visible = this.checked;
            if (sjParks) sjParks.visible = this.checked;
          }
        });
      });

      // ==================================================================
      //  FULL EXTENT BUTTON  — zoom / pan to all of New Brunswick
      // ==================================================================
      var NB_EXTENT = {
        xmin: -69.06,
        ymin: 44.56,
        xmax: -63.77,
        ymax: 48.07,
        spatialReference: { wkid: 4326 }
      };

      document.getElementById("fullExtentBtn").addEventListener("click", function () {
        view.goTo(NB_EXTENT, { duration: 800, easing: "ease-in-out" });
      });

      // ==================================================================
      //  POPUP CONFIG  (clean, informational — WA DOR style)
      // ==================================================================
      view.popup.dockEnabled = true;
      view.popup.dockOptions = {
        buttonEnabled: true,
        breakpoint: { width: 600 }
      };

    });
  </script>
</body>
</html>
